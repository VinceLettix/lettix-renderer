<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LETTIX — Générateur Dédicaces v3</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@700;800;900&family=DM+Sans:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;--border:#2a2a2a;--gold:#D4A843;--gold2:#F0C060;--cream:#FFF8E7;--text:#FFF8E7;--muted:#888;--radius:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:4px;color:var(--gold);line-height:1;}
.subtitle{font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--muted);letter-spacing:2px;}
.badge-v{font-family:'Space Mono',monospace;font-size:0.52rem;color:var(--muted);border:1px solid var(--border);padding:2px 7px;border-radius:4px;}
.main{max-width:960px;margin:0 auto;padding:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
.card-title{font-family:'Space Mono',monospace;font-size:0.58rem;text-transform:uppercase;letter-spacing:3px;color:var(--gold);margin-bottom:14px;}
.input-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.prenom-input{background:var(--surface2);border:2px solid var(--border);color:var(--cream);font-family:'Nunito',sans-serif;font-size:1.3rem;font-weight:900;padding:9px 16px;border-radius:10px;outline:none;width:280px;text-transform:uppercase;letter-spacing:3px;transition:border-color 0.2s;}
.prenom-input:focus{border-color:var(--gold);}
.compte-input{background:var(--surface2);border:2px solid var(--border);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:0.95rem;padding:9px 14px;border-radius:10px;outline:none;width:200px;transition:border-color 0.2s;}
.compte-input:focus{border-color:var(--gold);}
.count-badge{font-family:'Space Mono',monospace;font-size:0.68rem;color:var(--muted);}
.count-badge.ok{color:var(--gold);}
.count-badge.err{color:#ff6060;}
.gen-btn{background:var(--gold);color:#0a0a0a;border:none;font-family:'Space Mono',monospace;font-size:0.7rem;font-weight:700;padding:11px 22px;border-radius:10px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all 0.15s;}
.gen-btn:hover{background:var(--gold2);}
.gen-btn:disabled{background:#333;color:#666;cursor:not-allowed;}
.theme-row{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap;}
.theme-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'Space Mono',monospace;font-size:0.55rem;padding:5px 11px;border-radius:6px;cursor:pointer;transition:all 0.15s;letter-spacing:1px;}
.theme-btn.active{border-color:var(--gold);color:var(--gold);}
.swatch{display:inline-block;width:10px;height:10px;border-radius:2px;vertical-align:middle;margin-right:4px;border:1px solid rgba(255,255,255,0.15);}
.status{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--muted);min-height:16px;margin-top:8px;}
.status.ok{color:var(--gold);}
.status.err{color:#ff6060;}
.slides-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px;}
.slide-wrap{display:flex;flex-direction:column;gap:5px;align-items:center;}
.slide-label{font-family:'Space Mono',monospace;font-size:0.5rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);}
.slide-canvas{width:100%;border-radius:6px;box-shadow:0 4px 16px rgba(212,168,67,0.12);}
.slide-placeholder{width:100%;aspect-ratio:4/5;background:var(--surface2);border:1px dashed var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:0.52rem;color:var(--muted);text-align:center;padding:16px;}
.caption-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:0.88rem;line-height:1.75;white-space:pre-wrap;color:var(--cream);min-height:80px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'Space Mono',monospace;font-size:0.6rem;padding:9px 14px;border-radius:8px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all 0.15s;}
.btn:hover{border-color:var(--gold);color:var(--gold);}
.btn.primary{background:var(--gold);border-color:var(--gold);color:#0a0a0a;font-weight:700;}
.btn.primary:hover{background:var(--gold2);}
.btn.copied{background:var(--gold);border-color:var(--gold);color:#0a0a0a;}
</style>
</head>
<body>
<div class="header">
  <div><div class="logo">LETTIX</div><div class="subtitle">Générateur · Puzzle Dédicace</div></div>
  <div class="badge-v">v3.0</div>
</div>
<div class="main">
  <div class="card">
    <div class="card-title">✦ Paramètres de la dédicace</div>
    <div class="input-row">
      <div style="display:flex;flex-direction:column;gap:4px">
        <label style="font-family:Space Mono,monospace;font-size:0.55rem;color:var(--muted);letter-spacing:1px">COMPTE @instagram</label>
        <input type="text" class="compte-input" id="compteInput" placeholder="@pseudo_republié">
      </div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <label style="font-family:Space Mono,monospace;font-size:0.55rem;color:var(--muted);letter-spacing:1px">PRÉNOM (3–12 lettres)</label>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="text" class="prenom-input" id="prenomInput" placeholder="SARAH" maxlength="12" oninput="onPrenomInput(this.value)">
          <span class="count-badge" id="countBadge">0/12</span>
        </div>
      </div>
      <button class="gen-btn" id="genBtn" onclick="genererDedicace()" disabled style="align-self:flex-end">✦ GÉNÉRER</button>
    </div>
    <div class="status" id="genStatus"></div>
  </div>

  <div class="slides-grid" id="slidesGrid">
    <div class="slide-wrap"><div class="slide-label">Slide 1 — Défi</div><div class="slide-placeholder">Saisissez un prénom<br>et cliquez Générer</div></div>
    <div class="slide-wrap"><div class="slide-label">Slide 2 — Indice</div><div class="slide-placeholder"></div></div>
    <div class="slide-wrap"><div class="slide-label">Slide 3 — Solution</div><div class="slide-placeholder"></div></div>
  </div>

  <div class="card" id="captionCard" style="display:none">
    <div class="card-title">✦ Caption Instagram</div>
    <div class="caption-box" id="captionBox"></div>
    <div class="btn-row"><button class="btn" id="copyBtn" onclick="copyCaption()">📋 Copier la caption</button></div>
  </div>

  <div class="btn-row" id="exportRow" style="display:none">
    <button class="btn" onclick="dlSlide(0)">↓ Slide 1</button>
    <button class="btn" onclick="dlSlide(1)">↓ Slide 2</button>
    <button class="btn" onclick="dlSlide(2)">↓ Slide 3</button>
    <button class="btn primary" onclick="dlZip()">↓ Ouvrir les 3 slides + caption</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// THÈMES
// ══════════════════════════════════════════
const THEMES={
  gold2:{fond:'#FFF8E7',pieces:'#0a0a0a',police:'#FFF8E7',bordure:'#0a0a0a',soluce:'#D4A843',ancrage:'#3c3f49',texte:'#D4A843'},
};
let currentTheme=THEMES.gold2;
function setTheme(k,btn){}

// ══════════════════════════════════════════
// MOTEUR PIÈCES (v80 exact)
// ══════════════════════════════════════════
const SHAPES_H={
  'o':[[0,0]],'i1':[[0,0],[0,1]],'i2':[[0,0],[1,0]],
  'I1':[[0,0],[0,1],[0,2],[0,3]],'I2':[[0,0],[1,0],[2,0],[3,0]],
  'O':[[0,0],[0,1],[1,0],[1,1]],
  'L1':[[0,0],[1,0],[2,0],[2,1]],'L2':[[0,0],[0,1],[0,2],[1,0]],
  'L3':[[0,0],[0,1],[1,1],[2,1]],'L4':[[0,2],[1,0],[1,1],[1,2]],
  'J1':[[0,1],[1,1],[2,0],[2,1]],'J2':[[0,0],[1,0],[1,1],[1,2]],
  'J3':[[0,0],[0,1],[1,0],[2,0]],'J4':[[0,0],[0,1],[0,2],[1,2]],
  'S1':[[0,1],[0,2],[1,0],[1,1]],'S2':[[0,0],[1,0],[1,1],[2,1]],
  'S3':[[0,0],[0,1],[1,1],[1,2]],'S4':[[0,1],[1,0],[1,1],[2,0]],
  'Z1':[[0,0],[0,1],[1,1],[1,2]],'Z2':[[0,1],[1,0],[1,1],[2,0]],
  'Z3':[[0,1],[0,2],[1,0],[1,1]],'Z4':[[0,0],[1,0],[1,1],[2,1]],
  'T1':[[0,1],[1,0],[1,1],[1,2]],'T2':[[0,0],[1,0],[1,1],[2,0]],
  'T3':[[0,0],[0,1],[0,2],[1,1]],'T4':[[0,1],[1,0],[1,1],[2,1]],
};
const SHAPE_CONFIG={
  'o':{min:1,max:1},'i1':{min:2,max:2},'i2':{min:1,max:1},
  'I1':{min:4,max:4},'I2':{min:1,max:1},'O':{min:2,max:2},
  'L1':{min:1,max:2},'L2':{min:1,max:3},'L3':{min:1,max:2},'L4':{min:1,max:3},
  'J1':{min:1,max:2},'J2':{min:1,max:3},'J3':{min:1,max:2},'J4':{min:1,max:3},
  'S1':{min:2,max:2},'S2':{min:1,max:2},'S3':{min:2,max:2},'S4':{min:1,max:2},
  'Z1':{min:2,max:2},'Z2':{min:1,max:2},'Z3':{min:2,max:2},'Z4':{min:1,max:2},
  'T1':{min:1,max:3},'T2':{min:1,max:2},'T3':{min:1,max:3},'T4':{min:1,max:2},
};
const SHAPE_GROUP={
  'o':'o','i1':'i','i2':'i','I1':'I','I2':'I','O':'O',
  'L1':'L','L2':'L','L3':'L','L4':'L','J1':'J','J2':'J','J3':'J','J4':'J',
  'S1':'S','S2':'S','S3':'S','S4':'S','Z1':'Z','Z2':'Z','Z3':'Z','Z4':'Z',
  'T1':'T','T2':'T','T3':'T','T4':'T',
};
const SHAPE_LINE_SIZES={};
for(const[k,cells]of Object.entries(SHAPES_H)){const br={};cells.forEach(([r])=>{br[r]=(br[r]||0)+1;});SHAPE_LINE_SIZES[k]=new Set(Object.values(br));}
const FREQ_FR={A:8.23,B:1.21,C:3.72,D:3.89,E:20.47,F:1.13,G:1.30,H:1.18,I:7.09,J:0.36,K:0.31,L:5.25,M:2.78,N:6.77,O:5.65,P:2.64,Q:0.69,R:6.43,S:6.90,T:6.27,U:4.89,V:1.94,W:0.04,X:0.44,Y:0.20,Z:0.22,'_':3.00};
const CELL=75,GRID_N=4;

function stripAccents(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function getCellsH(p){return SHAPES_H[p.shape].map(([r,c])=>[r,c]);}
function getCellsV(p){return SHAPES_H[p.shape].map(([r,c])=>[c,r]);}
function variantesEligibles(n){return Object.keys(SHAPE_CONFIG).filter(v=>{const{min,max}=SHAPE_CONFIG[v];return n>=min&&n<=max&&SHAPE_LINE_SIZES[v].has(n);});}
function poids(n){return n===4?1:n===3?3:4;}
function tirerPondere(pool){const t=pool.reduce((s,x)=>s+x.w,0);let r=Math.random()*t;for(const x of pool){r-=x.w;if(r<=0)return x.item;}return pool[pool.length-1].item;}
function tirerLettre(excl){const pool=Object.entries(FREQ_FR).filter(([l])=>!excl.has(l));const t=pool.reduce((s,[,v])=>s+v,0);let r=Math.random()*t;for(const[l,v]of pool){r-=v;if(r<=0)return l;}return pool[pool.length-1][0];}

const state={pieces:[{shape:'L1',letters:[]},{shape:'Z2',letters:[]},{shape:'T1',letters:[]}],mot:''};
let soluceAligned=false;
let randomCombo=null,indice2Combo=null;

function allCombos(){
  const combos=[];
  for(const ord of[[0,1,2],[0,2,1],[1,0,2],[1,2,0],[2,0,1],[2,1,0]])
    for(const ori of[['h','h','h'],['h','h','v'],['h','v','h'],['v','h','h'],['h','v','v'],['v','h','v'],['v','v','h'],['v','v','v']])
      combos.push({ord,ori});
  return combos;
}
function ordKey(c){return c.ord.join(',');}
function pickCombo(excludeOrds=[]){
  const all=allCombos();const excSet=new Set(excludeOrds);
  const cands=all.filter(c=>!excSet.has(ordKey(c)));
  return cands[Math.floor(Math.random()*cands.length)]||all[0];
}

// ── checkAssemblageSoluce (v80 exact) ──
// Vérifie que les lettres-mot des 3 pièces accolées forment une ligne contiguë sans trou
function checkAssemblageSoluce(shapes,segments){
  const cells=shapes.map(s=>SHAPES_H[s]);
  function profilDroit(casesAbs){const p={};casesAbs.forEach(([r,c])=>{if(p[r]===undefined||c>p[r])p[r]=c;});return p;}
  function colOffsetAcole(casesAbsA,cellsB,rowOffB){
    const droitA=profilDroit(casesAbsA);let gap=1;
    cellsB.forEach(([r,c])=>{const gr=r+rowOffB;if(droitA[gr]!==undefined){const n=droitA[gr]-c+1;if(n>gap)gap=n;}});
    const maxColA=Math.max(...casesAbsA.map(([,c])=>c));
    const minColB=Math.min(...cellsB.map(([,c])=>c));
    return Math.max(gap,maxColA-minColB+1);
  }
  function motRowLocal(cellsP,seg){
    const byRow={};cellsP.forEach(([r,c],k)=>{if(!byRow[r])byRow[r]=[];byRow[r].push({c,k});});
    for(const[rs,cases]of Object.entries(byRow)){if(cases.length===seg.length)return parseInt(rs);}
    return parseInt(Object.entries(byRow).sort((a,b)=>b[1].length-a[1].length)[0][0]);
  }
  const motRows=shapes.map((s,i)=>motRowLocal(cells[i],segments[i]));
  const maxMR=Math.max(...motRows);
  const rowOffs=motRows.map(r=>maxMR-r);
  const colOffs=[0];
  let casesAbsCumul=cells[0].map(([r,c])=>[r+rowOffs[0],c]);
  for(let i=1;i<3;i++){
    const co=colOffsetAcole(casesAbsCumul,cells[i],rowOffs[i]);colOffs.push(co);
    casesAbsCumul=[...casesAbsCumul,...cells[i].map(([r,c])=>[r+rowOffs[i],c+co])];
  }
  const motCols=[];
  shapes.forEach((s,pi)=>{
    const mr=motRows[pi];const rOff=rowOffs[pi];const cOff=colOffs[pi];
    cells[pi].filter(([r])=>r===mr).sort((a,b)=>a[1]-b[1]).forEach(([,c])=>motCols.push(c+cOff));
  });
  motCols.sort((a,b)=>a-b);
  for(let i=1;i<motCols.length;i++){if(motCols[i]!==motCols[i-1]+1)return false;}
  return true;
}

function genererSetH(mot){
  const L=mot.length;const decomps=[];
  for(let n1=1;n1<=4;n1++){if(!variantesEligibles(n1).length)continue;
    for(let n2=1;n2<=4;n2++){if(!variantesEligibles(n2).length)continue;
      const n3=L-n1-n2;if(n3<1||n3>4)continue;if(!variantesEligibles(n3).length)continue;
      decomps.push([n1,n2,n3]);}}
  if(!decomps.length)return false;
  const pool=decomps.map(d=>({item:d,w:poids(d[0])*poids(d[1])*poids(d[2])}));
  let decomp,variants;
  for(let rl=0;rl<=2&&!variants;rl++){
    let tries=0;
    while(tries++<300){
      decomp=tirerPondere(pool);const[n1,n2,n3]=decomp;
      const p1=variantesEligibles(n1),p2=variantesEligibles(n2),p3=variantesEligibles(n3);
      if(!p1.length||!p2.length||!p3.length)continue;
      const v1=p1[Math.floor(Math.random()*p1.length)];
      const g1=SHAPE_GROUP[v1];
      let p2f=rl>=1?p2:p2.filter(v=>SHAPE_GROUP[v]!==g1);if(!p2f.length)p2f=p2;
      const v2=p2f[Math.floor(Math.random()*p2f.length)];
      const g2=SHAPE_GROUP[v2];
      let p3f;
      if(rl===0)p3f=p3.filter(v=>SHAPE_GROUP[v]!==g1&&SHAPE_GROUP[v]!==g2);
      else if(rl===1){p3f=p3.filter(v=>SHAPE_GROUP[v]!==g1||SHAPE_GROUP[v]!==g2);if(!p3f.length)p3f=p3;}
      else p3f=p3;
      if(!p3f.length)continue;
      const v3=p3f[Math.floor(Math.random()*p3f.length)];
      // Vérification contiguïté lettres-mot (v80 checkAssemblageSoluce)
      const s1=mot.slice(0,n1).toUpperCase(),s2=mot.slice(n1,n1+n2).toUpperCase(),s3=mot.slice(n1+n2).toUpperCase();
      if(!checkAssemblageSoluce([v1,v2,v3],[s1,s2,s3]))continue;
      variants=[v1,v2,v3];break;
    }
  }
  if(!variants)return false;
  const[n1,n2,n3]=decomp;
  const seg1=mot.slice(0,n1),seg2=mot.slice(n1,n1+n2),seg3=mot.slice(n1+n2);
  function placerLettres(sk,seg){
    const cells=SHAPES_H[sk];const nT=cells.length,n=seg.length;
    const byRow={};cells.forEach(([r,c],k)=>{if(!byRow[r])byRow[r]=[];byRow[r].push({r,c,k});});
    const rows=Object.entries(byRow).map(([rs,cases])=>({r:parseInt(rs),cases:cases.sort((a,b)=>a.c-b.c),count:cases.length}));
    let base=rows.find(row=>row.count===n);
    if(!base){const cands=rows.filter(row=>row.count<=n).sort((a,b)=>b.count-a.count);base=cands[0];}
    if(!base)base=rows.sort((a,b)=>b.count-a.count)[0];
    const letters=Array(nT).fill('');
    seg.split('').forEach((l,i)=>{if(i<base.cases.length)letters[base.cases[i].k]=l;});
    return letters;
  }
  state.pieces[0]={shape:variants[0],letters:placerLettres(variants[0],seg1)};
  state.pieces[1]={shape:variants[1],letters:placerLettres(variants[1],seg2)};
  state.pieces[2]={shape:variants[2],letters:placerLettres(variants[2],seg3)};
  const motL=new Set(mot.split(''));
  [0,1,2].forEach(pi=>{state.pieces[pi].letters=state.pieces[pi].letters.map(l=>l!==''?l:tirerLettre(motL));});
  state.mot=mot;soluceAligned=false;return true;
}

// ══════════════════════════════════════════
// DESSIN
// ══════════════════════════════════════════
function addEdge(m,x1,y1,x2,y2){m[`${x1},${y1}`]=[x2,y2];}
function traceRounded(ctx,pts,r){
  const n=pts.length;
  for(let i=0;i<n;i++){
    const[x0,y0]=pts[(i-1+n)%n],[x1,y1]=pts[i],[x2,y2]=pts[(i+1)%n];
    const dx0=x1-x0,dy0=y1-y0,dx1=x2-x1,dy1=y2-y1;
    const l0=Math.hypot(dx0,dy0)||1,l1=Math.hypot(dx1,dy1)||1;
    const ar=Math.min(r,l0/2,l1/2);
    const ex=x1-(dx0/l0)*ar,ey=y1-(dy0/l0)*ar,fx=x1+(dx1/l1)*ar,fy=y1+(dy1/l1)*ar;
    if(i===0)ctx.moveTo(ex,ey);else ctx.lineTo(ex,ey);ctx.arcTo(x1,y1,fx,fy,ar);
  }ctx.closePath();
}
function strokeOutline(ctx,cells,activeSet,C,color,lw){
  const em={};
  cells.forEach(([r,c])=>{
    const x=c*C,y=r*C;
    if(!activeSet.has(`${r-1},${c}`))addEdge(em,x,y,x+C,y);
    if(!activeSet.has(`${r},${c+1}`))addEdge(em,x+C,y,x+C,y+C);
    if(!activeSet.has(`${r+1},${c}`))addEdge(em,x+C,y+C,x,y+C);
    if(!activeSet.has(`${r},${c-1}`))addEdge(em,x,y+C,x,y);
  });
  const keys=Object.keys(em);if(!keys.length)return;
  const pts=[];let cur=keys[0];const start=cur;
  for(let s=0;s<400;s++){pts.push(cur.split(',').map(Number));const nxt=em[cur];if(!nxt)break;cur=`${nxt[0]},${nxt[1]}`;if(cur===start)break;}
  if(!pts.length)return;
  ctx.save();ctx.beginPath();traceRounded(ctx,pts,Math.min(lw*1.5,C*0.25));
  ctx.strokeStyle=color;ctx.lineWidth=lw;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();ctx.restore();
}

function drawPiece(canvas,cells,letters,scale,theme,alignBR=false){
  const C=CELL*scale;canvas.width=GRID_N*C;canvas.height=GRID_N*C;
  const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);
  let oR=0,oC=0;
  if(alignBR){const mR=Math.max(...cells.map(([r])=>r));const mC=Math.max(...cells.map(([,c])=>c));oR=(GRID_N-1)-mR;oC=(GRID_N-1)-mC;}
  const sc=cells.map(([r,c])=>[r+oR,c+oC]);
  const activeSet=new Set(sc.map(([r,c])=>`${r},${c}`));
  sc.forEach(([r,c])=>{ctx.fillStyle=theme.pieces;ctx.fillRect(Math.floor(c*C),Math.floor(r*C),Math.ceil(C)+1,Math.ceil(C)+1);ctx.fillRect(c*C,r*C,C,C);});
  const fs=Math.round(C*0.50);
  ctx.font=`700 ${fs}px "Nunito",sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=theme.police;
  sc.forEach(([r,c],k)=>{ctx.fillText((letters[k]||'').toUpperCase(),c*C+C/2,r*C+C/2);});
  strokeOutline(ctx,sc,activeSet,C,theme.bordure,4*scale);
}
function makePieceCanvas(pIdx,orient,scale,theme,alignBR=false){
  const p=state.pieces[pIdx];const cells=orient==='h'?getCellsH(p):getCellsV(p);
  const c=document.createElement('canvas');drawPiece(c,cells,p.letters.slice(),scale,theme,alignBR);return c;
}
function assembleCanvases(pieces,scale){
  const C=CELL*scale,COLS=4,PAD=Math.round(C*0.4);
  const totalW=COLS*3*C+PAD*2,maxH=Math.max(...pieces.map(p=>p.height));
  const c=document.createElement('canvas');c.width=totalW;c.height=maxH+PAD*2;
  const ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);
  pieces.forEach((p,i)=>{ctx.drawImage(p,PAD+i*COLS*C,PAD+(maxH-p.height)/2);});return c;
}
function buildChallengeCanvas(combo,transposed,scale,theme){
  const{ord,ori}=combo;
  const orients=transposed?ori.map(o=>o==='h'?'v':'h'):ori;
  const pieces=ord.map((pi,k)=>makePieceCanvas(pi,orients[k],scale,theme,!transposed));
  return assembleCanvases(pieces,scale);
}

// ── findMotRows exact v80 ──
function casesByRow(cells){
  const map=new Map();
  cells.forEach(([r,c],k)=>{if(!map.has(r))map.set(r,[]);map.get(r).push({col:c,k});});
  map.forEach(arr=>arr.sort((a,b)=>a.col-b.col));return map;
}
function findMotRows(cellsList,lettersList,mot){
  if(!mot)return null;
  const rowMaps=cellsList.map(cells=>casesByRow(cells));
  const rowSets=rowMaps.map(m=>[...m.keys()]);
  const target=mot.toUpperCase();
  for(const r0 of rowSets[0])for(const r1 of rowSets[1])for(const r2 of rowSets[2]){
    const letters=[
      ...rowMaps[0].get(r0).map(({k})=>lettersList[0][k]||''),
      ...rowMaps[1].get(r1).map(({k})=>lettersList[1][k]||''),
      ...rowMaps[2].get(r2).map(({k})=>lettersList[2][k]||''),
    ].map(l=>l.toUpperCase()).filter(l=>l&&l!=='-'&&l!==' ').join('');
    if(letters===target)return[r0,r1,r2];
  }
  return null;
}

// ── Soluce accolée TIGHT (v80 buildSoluceAcole avec tight=true) ──
function buildSoluceAcoleCanvas(scale,theme){
  const C=CELL*scale;
  const PAD=Math.round(C*0.5);
  const TARGET_LINE=3;
  const pieceOrder=[0,1,2];
  const orients=['h','h','h'];

  const cellsList=[0,1,2].map(col=>{const p=state.pieces[pieceOrder[col]];return orients[col]==='h'?getCellsH(p):getCellsV(p);});
  const lettersList=[0,1,2].map(col=>state.pieces[pieceOrder[col]].letters);
  const mot=state.mot||'';
  const motRows=findMotRows(cellsList,lettersList,mot);

  // offsetRows : aligner sur TARGET_LINE si motRows trouvé
  let offsetRows;
  if(motRows){offsetRows=motRows.map(r=>TARGET_LINE-r);}
  else{const bots=cellsList.map(cells=>Math.max(...cells.map(([r])=>r)));const mb=Math.max(...bots);offsetRows=bots.map(b=>mb-b);}

  // colOffsets tight : accolement par profil droit/gauche
  function profilDroit(casesAbs){const p={};casesAbs.forEach(([r,c])=>{if(p[r]===undefined||c>p[r])p[r]=c;});return p;}
  function colAcole(casesAbsA,cellsB,rowOffB){
    const droit=profilDroit(casesAbsA);let gap=1;
    cellsB.forEach(([r,c])=>{const gr=r+rowOffB;if(droit[gr]!==undefined){const n=droit[gr]-c+1;if(n>gap)gap=n;}});
    const maxColA=Math.max(...casesAbsA.map(([,c])=>c));
    const minColB=Math.min(...cellsB.map(([,c])=>c));
    return Math.max(gap,maxColA-minColB+1);
  }
  const colOffsets=[0];
  let cumul=cellsList[0].map(([r,c])=>[r+offsetRows[0],c]);
  for(let i=1;i<3;i++){
    const co=colAcole(cumul,cellsList[i],offsetRows[i]);colOffsets.push(co);
    cumul=[...cumul,...cellsList[i].map(([r,c])=>[r+offsetRows[i],c+co])];
  }

  // Bounding box
  const allAbs=cellsList.flatMap((cells,pi)=>cells.map(([r,c])=>[r+offsetRows[pi],c+colOffsets[pi]]));
  const cMin=Math.min(...allAbs.map(([,c])=>c));
  const cMax=Math.max(...allAbs.map(([,c])=>c));
  const rMin=Math.min(...allAbs.map(([r])=>r));
  const rMax=Math.max(...allAbs.map(([r])=>r));
  const totalCols=cMax-cMin+1,totalRows=rMax-rMin+1;

  const canvasW=totalCols*C+PAD*2,canvasH=totalRows*C+PAD*2;
  const cv=document.createElement('canvas');cv.width=canvasW;cv.height=canvasH;
  const ctx=cv.getContext('2d');ctx.clearRect(0,0,canvasW,canvasH);
  const fs=Math.round(C*0.50);ctx.textAlign='center';ctx.textBaseline='middle';

  // Remplir cases
  cellsList.forEach((cells,pi)=>{
    cells.forEach(([r,cc])=>{
      const gr=r+offsetRows[pi]-rMin,gc=cc+colOffsets[pi]-cMin;
      const px=PAD+gc*C,py=PAD+gr*C;
      ctx.fillStyle=theme.pieces;
      ctx.fillRect(Math.floor(px),Math.floor(py),Math.ceil(C)+1,Math.ceil(C)+1);
      ctx.fillRect(px,py,C,C);
    });
  });

  // Lettres — silhouette puis mot
  cellsList.forEach((cells,pi)=>{
    const letters=lettersList[pi];
    const mr=motRows?motRows[pi]:null;
    cells.forEach(([r,cc],k)=>{
      const gr=r+offsetRows[pi]-rMin,gc=cc+colOffsets[pi]-cMin;
      const isMot=mr!==null&&r===mr;
      const px=PAD+gc*C+C/2,py=PAD+gr*C+C/2;
      if(isMot){ctx.font=`900 ${fs}px "Nunito",sans-serif`;ctx.fillStyle=theme.soluce;}
      else{ctx.font=`700 ${fs}px "Nunito",sans-serif`;ctx.fillStyle=theme.police;}
      ctx.fillText((letters[k]||'').toUpperCase(),px,py);
    });
  });

  // Bordures par pièce
  [0,1,2].forEach(pi=>{
    const cells=cellsList[pi];const activeSet=new Set();
    const sc=cells.map(([r,cc])=>{const gr=r+offsetRows[pi]-rMin,gc=cc+colOffsets[pi]-cMin;activeSet.add(`${gr},${gc}`);return[gr,gc];});
    ctx.save();ctx.translate(PAD,PAD);strokeOutline(ctx,sc,activeSet,C,theme.bordure,4*scale);ctx.restore();
  });
  return cv;
}

// ── Indice 2 : portage exact buildSoluceAcole du v80 ──
function buildIndice2Canvas(combo,scale,theme){
  const{ord,ori}=combo;
  const pieceOrder=ord;
  const orients=ori;
  const C=CELL*scale;
  const COLS_PER=4,TOTAL_COLS=12,PAD=Math.round(C*0.5);

  const cellsList=[0,1,2].map(col=>{
    const p=state.pieces[pieceOrder[col]];
    return orients[col]==='h'?getCellsH(p):getCellsV(p);
  });
  const lettersList=[0,1,2].map(col=>state.pieces[pieceOrder[col]].letters);

  // motRowsH en H (source de vérité), réindexés sur pieceOrder
  const cellsH=[0,1,2].map(i=>getCellsH(state.pieces[i]));
  const lettersH=[0,1,2].map(i=>state.pieces[i].letters);
  const motRowsH=findMotRows(cellsH,lettersH,state.mot||'');
  const motRowsReindexed=motRowsH?[0,1,2].map(col=>motRowsH[pieceOrder[col]]):null;
  const motRows=motRowsReindexed;

  // offsetRows
  let offsetRows;
  if(motRows&&motRows.every(r=>r!==null)){
    const maxMR=Math.max(...motRows);offsetRows=motRows.map(r=>maxMR-r);
  }else{
    const bots=cellsList.map(cells=>Math.max(...cells.map(([r])=>r)));
    const mb=Math.max(...bots);offsetRows=bots.map(b=>mb-b);
  }
  const colOffsets=[0,COLS_PER,COLS_PER*2];

  const allAbs=cellsList.flatMap((cells,pi)=>cells.map(([r,c])=>[r+offsetRows[pi],c+colOffsets[pi]]));
  const cAbsMin=Math.min(...allAbs.map(([,c])=>c));
  const rAbsMin=Math.min(...allAbs.map(([r])=>r));
  const rAbsMax=Math.max(...allAbs.map(([r])=>r));
  const totalCols=Math.max(...allAbs.map(([,c])=>c))-cAbsMin+1;
  const totalRows=rAbsMax-rAbsMin+1;

  // Grille logique — isMot : V→colonne, H→ligne (portage exact v80 L3644)
  const grid=Array.from({length:totalRows+2},()=>
    Array.from({length:totalCols+2},()=>({active:false,letter:'',isMotRow:false})));
  const motRowPerPiece=motRows||[null,null,null];
  cellsList.forEach((cells,pi)=>{
    const isV=orients[pi]==='v';
    cells.forEach(([r,c],k)=>{
      const gr=r+offsetRows[pi]-rAbsMin;
      const gc=c+colOffsets[pi]-cAbsMin;
      if(gr>=0&&gr<grid.length&&gc>=0&&gc<grid[0].length){
        const isMot=motRowPerPiece[pi]!==null
          ?(isV?c===motRowPerPiece[pi]:r===motRowPerPiece[pi])
          :false;
        grid[gr][gc]={active:true,letter:(lettersList[pi][k]||'').toUpperCase(),isMotRow:isMot};
      }
    });
  });

  const canvasW=TOTAL_COLS*C+PAD*2,canvasH=totalRows*C+PAD*2;
  const cv=document.createElement('canvas');cv.width=canvasW;cv.height=canvasH;
  const ctx=cv.getContext('2d');ctx.clearRect(0,0,canvasW,canvasH);
  const fs=Math.round(C*0.50);
  const colDrawOffset=totalCols<TOTAL_COLS?Math.round((TOTAL_COLS-totalCols)/2)*C:0;
  ctx.textAlign='center';ctx.textBaseline='middle';

  // Remplir cases
  for(let r=0;r<totalRows;r++)for(let c=0;c<totalCols;c++){
    if(!grid[r][c].active)continue;
    const px=PAD+colDrawOffset+c*C,py=PAD+r*C;
    ctx.fillStyle=theme.pieces;
    ctx.fillRect(Math.floor(px),Math.floor(py),Math.ceil(C)+1,Math.ceil(C)+1);
    ctx.fillRect(px,py,C,C);
  }

  // Passe 1 : silhouette
  ctx.font=`700 ${fs}px "Nunito",sans-serif`;ctx.fillStyle=theme.police;
  for(let r=0;r<totalRows;r++)for(let c=0;c<totalCols;c++){
    const cell=grid[r][c];
    if(!cell.active||!cell.letter||cell.isMotRow)continue;
    ctx.fillText(cell.letter,PAD+colDrawOffset+c*C+C/2,PAD+r*C+C/2);
  }

  // Passe 2 : lettres du mot en doré
  ctx.font=`900 ${fs}px "Nunito",sans-serif`;ctx.fillStyle=theme.soluce;
  for(let r=0;r<totalRows;r++)for(let c=0;c<totalCols;c++){
    const cell=grid[r][c];
    if(!cell.active||!cell.letter||!cell.isMotRow)continue;
    ctx.fillText(cell.letter,PAD+colDrawOffset+c*C+C/2,PAD+r*C+C/2);
  }

  // Bordures par pièce
  [0,1,2].forEach(pi=>{
    const cells=cellsList[pi];const activeSet=new Set();
    const sc=cells.map(([r,c])=>{
      const gr=r+offsetRows[pi]-rAbsMin,gc=c+colOffsets[pi]-cAbsMin;
      activeSet.add(`${gr},${gc}`);return[gr,gc];
    });
    ctx.save();ctx.translate(PAD+colDrawOffset,PAD);
    strokeOutline(ctx,sc,activeSet,C,theme.bordure,4*scale);ctx.restore();
  });
  return cv;
}


function exportToSize(src,W,H){
  const c=document.createElement('canvas');c.width=W;c.height=H;
  const ctx=c.getContext('2d');const sc=Math.min(W/src.width,H/src.height);
  const dw=src.width*sc,dh=src.height*sc;ctx.drawImage(src,(W-dw)/2,(H-dh)/2,dw,dh);return c;
}

    const k=`tpl${n}`;if(TEMPLATES_LOADED[k]){resolve(TEMPLATES_LOADED[k]);return;}

  const tc=tmp.getContext('2d');tc.drawImage(img,0,0,SLIDE_W,SLIDE_H);
  const id=tc.getImageData(0,0,SLIDE_W,SLIDE_H);const d=id.data;
  for(let i=0;i<d.length;i+=4){if(d[i]>WHITE_THR&&d[i+1]>WHITE_THR&&d[i+2]>WHITE_THR)d[i+3]=0;}
  tc.putImageData(id,0,0);ctx.drawImage(tmp,0,0);
}

// ══════════════════════════════════════════
// TEXTES SUR CANVAS (v80 drawTextZone exact)
// ══════════════════════════════════════════
function drawTextZone(ctx,text,x,y,w,sz,color,weight){
  if(!text)return;
  ctx.save();
  ctx.font=`${weight||800} ${sz}px "Nunito",sans-serif`;
  ctx.fillStyle=color;ctx.textAlign='center';ctx.textBaseline='middle';
  const resolved=text.replace(/\\n/g,'\n');
  const segments=resolved.split('\n');let allLines=[];
  for(const seg of segments){
    const words=seg.split(' ');let line='';
    for(const word of words){const test=line?line+' '+word:word;if(ctx.measureText(test).width>w-20){allLines.push(line);line=word;}else line=test;}
    if(line)allLines.push(line);
  }
  const lH=sz*1.2,startY=y+(sz*0.6),centerX=x+w/2;
  allLines.forEach((l,i)=>ctx.fillText(l,centerX,startY+i*lH));
  ctx.restore();
}
function drawBadge(ctx,text,x,y,w,h,r,sz,bgColor,textColor){
  ctx.save();
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
  ctx.fillStyle=bgColor;ctx.fill();
  ctx.font=`800 ${sz}px "Nunito",sans-serif`;ctx.fillStyle=textColor;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,x+w/2,y+h/2);ctx.restore();
}
function drawOverlay(ctx,src,x,y){
  if(!src)return;const px=x===-1?Math.round((SLIDE_W-src.width)/2):x;ctx.drawImage(src,px,y);
}

// ══════════════════════════════════════════
// BUILD SLIDES DÉDICACE
// ══════════════════════════════════════════
async function buildSlide(n,prenom,compte,challengeH,challengeV,indice2,soluce,theme){
  const cv=document.createElement('canvas');cv.width=SLIDE_W;cv.height=SLIDE_H;
  const ctx=cv.getContext('2d');
  ctx.fillStyle=theme.fond;ctx.fillRect(0,0,SLIDE_W,SLIDE_H);
  const tpl=await loadTpl(n);drawTpl(ctx,tpl);

  const pc=theme.texte||theme.police,ac=theme.ancrage,sc2=theme.soluce;
  const nomMaj=prenom.toUpperCase();
  const hashtagMot='#'+stripAccents(prenom).toLowerCase().replace(/[^a-z]/g,'');
  const compteTag=compte?(compte.startsWith('@')?compte:'@'+compte):'@pseudo';

  if(n===1){
    // Badge DÉDICACE — badge_s1 : x=415,y=18,w=250,h=75,r=37,sz=34
    const badgeBg=theme.pieces;
    const badgeFg=theme.fond==='#0a0a0a'?'#0a0a0a':theme.fond;
    drawBadge(ctx,'✦ Dédicace',415,18,250,75,37,34,badgeBg,badgeFg);

    // Texte 1 — tz_s1a : sz=42 (réduit), x=0, y=110, w=1080, col=pc
    drawTextZone(ctx,`Merci à ${compteTag} 🙏 pour ton partage !`,0,110,1080,34,pc);

    // Texte 2 — tz_s1b : sz=36, x=0, y=220, w=1080, col=ac
    drawTextZone(ctx,"Devine à qui s'adresse sa dédicace !\n(en combinant ces 3 pièces)",0,170,1080,36,ac);

    // 3 pièces H — bPos_s1h : x=0, y=310
    drawOverlay(ctx,challengeH,0,310);
    // 3 pièces V — bPos_s1v : x=0, y=800
    drawOverlay(ctx,challengeV,0,800);

  }else if(n===2){
    // Texte 1 — tz_s2a : sz=66, x=0, y=50, w=1080, col=ac
    drawTextZone(ctx,`Si tu connais ${compteTag}`,0,50,1080,58,ac);

    // Texte 2 — tz_s2b : sz=54, x=0, y=150, w=1080, col=pc
    drawTextZone(ctx,"C\'est peut-être quelqu\'un\\nque tu connais aussi ! 😉",0,150,1080,48,pc);

    // Texte 3 — tz_s2c : sz=60, x=0, y=470, w=1080, col=ac
    drawTextZone(ctx,'Aide-toi de cet Indice Lettix',0,470,1080,58,ac);

    // Indice 2 — bPos_s2i : x=-1, y=600
    drawOverlay(ctx,indice2,-1,600);

  }else if(n===3){
    // Texte 1 info LETTIX — tz_s3a : sz=30, x=0, y=100, w=600, col=pc
    drawTextZone(ctx,'❤️ Fil Insta inspiré du Jeu LETTIX\\nPour des parties rapides (5-15 min)\\nDès 7 ans, en famille ou entre amis\\nRejouable à l’infini avec ses 60 Pièces\\nEt ses milliers de combinaisons !\\nCréé en 🇫🇷 (lien bientôt en description)',0,100,600,30,pc);

    // Texte 2 "Et voilà" — tz_s3b : sz=66, x=0, y=470, w=1080, col=ac
    drawTextZone(ctx,'😮 Et voilà !',0,470,1080,66,ac);

    // Soluce accolée — bPos_s3s : x=-1, y=550
    drawOverlay(ctx,soluce,-1,550);

    // Texte 3 "Tu Tag Qui" — tz_s3c : sz=44, x=721, y=1100, w=250, col=pc
    drawTextZone(ctx,'Tu Tag\nQui ? 😉',721,1100,250,44,pc);

    // Texte 4 hashtag — tz_s3d : sz=34, x=650, y=1300, w=430, col=pc
    drawTextZone(ctx,hashtagMot,650,1300,430,34,pc);
  }
  return cv;
}

// ══════════════════════════════════════════
// CAPTION
// ══════════════════════════════════════════
function buildCaption(prenom,compte){
  const min=stripAccents(prenom).toLowerCase().replace(/[^a-z]/g,'');
  const tag=compte?(compte.startsWith('@')?compte:'@'+compte):'@pseudo';
  const lines=[
    '\u2728 Merci '+tag+' pour ton partage ! \uD83D\uDE4F',
    '\uD83C\uDF81 Pour te remercier, voici la combinaison personnalis\u00e9e unique pour ta d\u00e9dicace !',
    '\uD83D\uDC49 Si toi aussi tu veux un mini-puzzle Lettix personnalis\u00e9 en moins de 12 lettres (pr\u00e9nom ou d\u00e9claration \uD83D\uDE09) ?',
    'R\u00e9ponds en commentaire avec uniquement ton mot \u00e0 d\u00e9dicacer !',
    '(patience, on fait de notre mieux pour l\u2019int\u00e9grer \u00e0 nos prochaines publications et on te tient au courant)',
    '',
    '#MyLettix #'+min+' #jeudesociete #d\u00e9dicace'
  ];
  return lines.join('\n');
}

// ══════════════════════════════════════════
// UI
// ══════════════════════════════════════════
let generatedSlides=[],currentPrenom='',currentCompte='';

function onPrenomInput(val){
  const clean=stripAccents(val).toUpperCase().replace(/[^A-Z]/g,'');
  const L=clean.length;
  const badge=document.getElementById('countBadge');
  badge.textContent=`${L}/12`;badge.className='count-badge'+(L>=3&&L<=12?' ok':L>0?' err':'');
  document.getElementById('genBtn').disabled=!(L>=3&&L<=12);
}
function setStatus(msg,cls=''){const el=document.getElementById('genStatus');el.textContent=msg;el.className='status'+(cls?' '+cls:'');}

async function genererDedicace(){
  const raw=document.getElementById('prenomInput').value;
  const prenom=stripAccents(raw).toUpperCase().replace(/[^A-Z]/g,'');
  const compte=document.getElementById('compteInput').value.trim();
  if(prenom.length<3||prenom.length>12){setStatus('⚠ Prénom invalide (3–12 lettres)','err');return;}
  document.getElementById('genBtn').disabled=true;
  setStatus('⏳ Génération des pièces…');

  indice2Combo=pickCombo(['0,1,2']);
  randomCombo=pickCombo(['0,1,2',ordKey(indice2Combo)]);
  if(!genererSetH(prenom)){setStatus('⚠ Impossible de décomposer ce prénom','err');document.getElementById('genBtn').disabled=false;return;}

  setStatus('⏳ Rendu des slides…');
  const theme=currentTheme;

  // Challenge H & V (ordre randomCombo)
  const rawH=buildChallengeCanvas(randomCombo,false,1,theme);
  const challengeH=exportToSize(rawH,SLIDE_W,300);
  const rawV=buildChallengeCanvas(randomCombo,true,1,theme);
  const challengeV=exportToSize(rawV,SLIDE_W,300);

  // Indice 2 (ordre indice2Combo, orientations mixtes) — distinct de la soluce
  const rawI2=buildIndice2Canvas(indice2Combo,1,theme);
  const indice2=exportToSize(rawI2,SLIDE_W,300);

  // Soluce accolée TIGHT
  const rawS=buildSoluceAcoleCanvas(1,theme);
  const soluce=exportToSize(rawS,SLIDE_W,525);

  const s1=await buildSlide(1,prenom,compte,challengeH,challengeV,null,null,theme);
  const s2=await buildSlide(2,prenom,compte,null,null,indice2,null,theme);
  const s3=await buildSlide(3,prenom,compte,null,null,null,soluce,theme);
  generatedSlides=[s1,s2,s3];currentPrenom=prenom;currentCompte=compte;

  const grid=document.getElementById('slidesGrid');grid.innerHTML='';
  [s1,s2,s3].forEach((slide,i)=>{
    const wrap=document.createElement('div');wrap.className='slide-wrap';
    const lbl=document.createElement('div');lbl.className='slide-label';
    lbl.textContent=['Slide 1 — Défi','Slide 2 — Indice','Slide 3 — Solution'][i];
    const cv=document.createElement('canvas');cv.className='slide-canvas';
    cv.width=360;cv.height=450;cv.getContext('2d').drawImage(slide,0,0,360,450);
    wrap.appendChild(lbl);wrap.appendChild(cv);grid.appendChild(wrap);
  });

  document.getElementById('captionBox').textContent=buildCaption(prenom,compte);
  document.getElementById('captionCard').style.display='';
  document.getElementById('exportRow').style.display='';
  setStatus(`✅ Dédicace "${prenom}" générée — prête pour Dropbox`,'ok');
  document.getElementById('genBtn').disabled=false;
}

function dlSlide(i){
  if(!generatedSlides[i])return;
  const a=document.createElement('a');
  a.download='LETTIX_Dedicace_'+currentPrenom+'_Slide'+(i+1)+'.png';
  a.href=generatedSlides[i].toDataURL('image/png');
  a.style.display='none';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>document.body.removeChild(a),100);
}
async function dlZip(){
  if(!generatedSlides.length)return;
  const zip=new JSZip();
  const folder=zip.folder('LETTIX_Dedicace_'+currentPrenom);
  generatedSlides.forEach((s,idx)=>{
    const data=s.toDataURL('image/png').split(',')[1];
    folder.file('LETTIX_Dedicace_'+currentPrenom+'_Slide'+(idx+1)+'.png',data,{base64:true});
  });
  folder.file('LETTIX_Dedicace_'+currentPrenom+'_caption.txt',buildCaption(currentPrenom,currentCompte));
  const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.download='LETTIX_Dedicace_'+currentPrenom+'.zip';
  a.href=url;
  a.style.display='none';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},500);
}
function copyCaption(){
  const txt=document.getElementById('captionBox').textContent;const btn=document.getElementById('copyBtn');
  const ok=()=>{btn.textContent='✓ Copié !';btn.classList.add('copied');setTimeout(()=>{btn.textContent='📋 Copier la caption';btn.classList.remove('copied');},1500);};
  navigator.clipboard.writeText(txt).then(ok).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);ok();});
}
